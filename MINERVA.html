<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MINERVA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#050d1a;
  --panel:#0a1628;
  --panel2:#0d1e35;
  --cyan:#00d4ff;
  --cyan-dim:rgba(0,212,255,0.10);
  --text:#c8e8f5;
  --text-dim:#5a8aaa;
  --text-bright:#e8f4ff;
  --border:rgba(0,212,255,0.16);
  --border-bright:rgba(0,212,255,0.42);
  --green:#00ff88;
  --green-dim:rgba(0,255,136,0.10);
}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.phone-frame{
  position:relative;
  width:100%;height:100%;
  max-width:calc(100vh * 9 / 19.5);
  max-height:calc(100vw * 19.5 / 9);
  background:var(--navy);
  overflow:hidden;
  display:flex;flex-direction:column;
}
.app{width:100%;flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 6px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.logo{font-size:15px;font-weight:700;letter-spacing:3px;color:var(--cyan);font-family:'Share Tech Mono',monospace;}
.logo span{color:var(--text-dim);font-weight:300;}
.topbar-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.status{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:pulse 2s infinite;}
.today-date{font-size:9px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.weather-section{padding:10px 16px 8px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.weather-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.temp-row{display:flex;align-items:baseline;gap:4px;}
.temp-big{font-size:42px;font-weight:300;color:var(--cyan);line-height:1;font-family:'Share Tech Mono',monospace;}
.temp-unit{font-size:16px;color:var(--text-dim);}
.w-val{font-size:11px;color:var(--text);letter-spacing:0.5px;}
.chart-outer{position:relative;width:100%;overflow:hidden;}
.chart-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;cursor:grab;}
.chart-scroll:active{cursor:grabbing;}
.chart-scroll::-webkit-scrollbar{height:2px;}
.chart-scroll::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:1px;}
.chart-inner{position:relative;height:110px;}
.chart-labels-scroll{display:flex;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;}
.chart-labels-scroll::-webkit-scrollbar{display:none;}
.chart-label-row{display:flex;flex-shrink:0;}
.legend{display:flex;gap:12px;margin-top:4px;font-size:8px;color:var(--text-dim);}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-dot{width:10px;height:2px;border-radius:1px;}
.scroll-hint{font-size:7px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:1px;opacity:0.6;}
.protocols-section{flex:1;padding:10px 16px;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.section-label{font-size:8px;letter-spacing:3px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;margin-bottom:8px;flex-shrink:0;}
.protocol-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;padding-bottom:4px;}
.protocol-list::-webkit-scrollbar{width:2px;}
.protocol-list::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:1px;}
.protocol-card{background:var(--panel);border:0.5px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;gap:12px;flex-shrink:0;transition:border-color 0.15s,background 0.15s;}
.protocol-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cyan);opacity:0.5;}
.protocol-card:active{background:var(--panel2);border-color:var(--border-bright);}
.drag-handle{color:var(--text-dim);padding:4px 2px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;cursor:grab;touch-action:none;}
.drag-handle span{display:block;width:14px;height:1.5px;background:var(--text-dim);border-radius:1px;}
.protocol-card.dragging{opacity:0.35;border-color:var(--border-bright);}
.protocol-card.drag-over{border-color:var(--cyan);background:var(--panel2);}
.p-icon{width:32px;height:32px;border-radius:7px;background:var(--cyan-dim);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--cyan);font-weight:700;flex-shrink:0;}
.p-info{flex:1;min-width:0;}
.p-name{font-size:13px;font-weight:600;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-meta{font-size:8px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin-top:2px;}
.p-arrow{color:var(--cyan);font-size:18px;opacity:0.4;flex-shrink:0;}
.player-wrap{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--navy);z-index:300;display:none;flex-direction:column;}
.player-wrap.active{display:flex;}
.player-header{padding:14px 16px 10px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.player-ptitle{font-size:14px;font-weight:700;letter-spacing:2px;color:var(--cyan);font-family:'Share Tech Mono',monospace;flex:1;margin-right:12px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.player-close-btn{background:transparent;border:0.5px solid var(--border);border-radius:7px;color:var(--text-dim);padding:7px 14px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;flex-shrink:0;}
.player-close-btn:active{border-color:var(--border-bright);color:var(--cyan);}
.prog-wrap{padding:0 16px;margin:12px 0 0;flex-shrink:0;}
.prog-track{height:3px;background:rgba(0,212,255,0.08);border-radius:2px;}
.prog-fill{height:3px;background:var(--cyan);border-radius:2px;transition:width 0.35s ease;}
.prog-labels{display:flex;justify-content:space-between;margin-top:6px;}
.prog-step-label{font-size:13px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
.prog-pct-label{font-size:18px;font-weight:700;color:var(--cyan);font-family:'Share Tech Mono',monospace;}
.step-body{flex:1;padding:16px 20px 12px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.step-lbl{font-size:13px;letter-spacing:3px;color:var(--cyan);font-family:'Share Tech Mono',monospace;margin-bottom:16px;opacity:0.8;}
.step-txt{color:var(--text-bright);line-height:1.5;letter-spacing:0.2px;font-weight:500;white-space:pre-line;word-break:break-word;}
.step-note{font-size:10px;color:var(--cyan);font-family:'Share Tech Mono',monospace;letter-spacing:0.5px;margin-top:14px;padding:8px 12px;border:0.5px solid var(--border);border-radius:6px;background:var(--cyan-dim);}
.done-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:28px;}
.done-screen.show{display:flex;}
.done-icon{font-size:32px;margin-bottom:16px;color:var(--cyan);font-family:'Share Tech Mono',monospace;letter-spacing:4px;}
.done-title{font-size:28px;font-weight:700;color:var(--cyan);letter-spacing:3px;margin-bottom:8px;}
.done-sub{font-size:11px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:2px;}
.done-back{margin-top:32px;padding:13px 32px;background:var(--cyan-dim);border:0.5px solid var(--border-bright);border-radius:10px;color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;}
.player-ctrls{padding:14px 16px;border-top:0.5px solid var(--border);display:flex;gap:10px;flex-shrink:0;}
.p-ctrl{flex:1;padding:14px 8px;background:var(--panel);border:0.5px solid var(--border);border-radius:10px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;text-align:center;transition:border-color 0.15s,color 0.15s;}
.p-ctrl:active{border-color:var(--border-bright);color:var(--cyan);}
.p-ctrl.primary{background:var(--cyan-dim);border-color:var(--border-bright);color:var(--cyan);flex:2;font-size:12px;}
.p-ctrl.finish{background:var(--green-dim);border-color:rgba(0,255,136,0.3);color:var(--green);}
</style>
</head>

    </div>
    <div class="player-ctrls">
      <button class="p-ctrl" id="backBtn" onclick="playerPrev()">‹ BACK</button>
      <button class="p-ctrl primary" id="nextBtn" onclick="playerNext()">NEXT STEP ›</button>
      <button class="p-ctrl finish" id="doneBtn" style="display:none" onclick="closePlayer()">✓ DONE</button>
    </div>
  </div>

</div>
</div>

function renderHomeList(){
  var el=document.getElementById('homeProtoList');
  el.innerHTML='';
  protocols.forEach(function(p,i){
    var div=document.createElement('div');
    div.className='protocol-card';
    div.dataset.index=i;
    div.innerHTML=
      '<div class="drag-handle"><span></span><span></span><span></span></div>'+
      '<div class="p-icon">'+esc(p.icon)+'</div>'+
      '<div class="p-info">'+
        '<div class="p-name">'+esc(p.name)+'</div>'+
        '<div class="p-meta">'+p.steps.length+' STEPS</div>'+
      '</div>'+
      '<div class="p-arrow">›</div>';
    div.addEventListener('click',function(e){
      if(e.target.closest('.drag-handle'))return;
      startPlayer(p.id);
    });
    el.appendChild(div);
  });
  setupDrag();
}

var dragSrcIdx=-1;
var touchDragIdx=-1,touchDragEl=null,touchClone=null,touchOffsetY=0;

function setupDrag(){
  var list=document.getElementById('homeProtoList');
  var cards=list.querySelectorAll('.protocol-card');
  cards.forEach(function(card){
    card.addEventListener('dragstart',function(e){
      dragSrcIdx=parseInt(card.dataset.index);
      e.dataTransfer.effectAllowed='move';
      setTimeout(function(){card.classList.add('dragging');},0);
    });
    card.addEventListener('dragend',function(){
      card.classList.remove('dragging');
      list.querySelectorAll('.protocol-card').forEach(function(c){c.classList.remove('drag-over');});
    });
    card.addEventListener('dragover',function(e){
      e.preventDefault();
      list.querySelectorAll('.protocol-card').forEach(function(c){c.classList.remove('drag-over');});
      card.classList.add('drag-over');
    });
    card.addEventListener('drop',function(e){
      e.preventDefault();
      var tgt=parseInt(card.dataset.index);
      if(dragSrcIdx===tgt)return;
      var moved=protocols.splice(dragSrcIdx,1)[0];
      protocols.splice(tgt,0,moved);
      renderHomeList();
    });
    var handle=card.querySelector('.drag-handle');
    handle.addEventListener('touchstart',function(e){
      touchDragIdx=parseInt(card.dataset.index);
      touchDragEl=card;
      var touch=e.touches[0];
      var rect=card.getBoundingClientRect();
      touchOffsetY=touch.clientY-rect.top;
      touchClone=card.cloneNode(true);
      touchClone.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;opacity:0.85;z-index:999;pointer-events:none;background:var(--panel2);border:0.5px solid var(--border-bright);border-radius:10px;';
      document.body.appendChild(touchClone);
      card.style.opacity='0.3';
      e.preventDefault();
    },{passive:false});
  });
  document.addEventListener('touchmove',function(e){
    if(!touchClone)return;
    var touch=e.touches[0];
    touchClone.style.top=(touch.clientY-touchOffsetY)+'px';
    list.querySelectorAll('.protocol-card').forEach(function(c){c.classList.remove('drag-over');});
    var over=document.elementFromPoint(touch.clientX,touch.clientY);
    var overCard=over?over.closest('.protocol-card'):null;
    if(overCard&&overCard!==touchDragEl)overCard.classList.add('drag-over');
    e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',function(e){
    if(!touchClone)return;
    var touch=e.changedTouches[0];
    var over=document.elementFromPoint(touch.clientX,touch.clientY);
    var overCard=over?over.closest('#homeProtoList .protocol-card'):null;
    if(overCard){
      var tgt=parseInt(overCard.dataset.index);
      if(tgt!==touchDragIdx){
        var moved=protocols.splice(touchDragIdx,1)[0];
        protocols.splice(tgt,0,moved);
      }
    }
    touchClone.remove();touchClone=null;touchDragEl=null;touchDragIdx=-1;
    renderHomeList();
  });
}

var playerProtocol=null,playerStep=0;

function getStepData(step){
  if(typeof step==='string')return{text:step,note:null};
  return{text:step.text||'',note:step.note||null};
}

function startPlayer(id){
  var p=protocols.find(function(x){return x.id===id;});
  if(!p)return;
  playerProtocol=p;playerStep=0;
  document.getElementById('playerPTitle').textContent=p.name.toUpperCase();
  document.getElementById('doneScreen').classList.remove('show');
  document.getElementById('playerStepBody').style.display='flex';
  document.getElementById('playerWrap').classList.add('active');
  renderPlayerStep();
}

function fitStepText(){
  var container=document.getElementById('playerStepBody');
  var el=document.getElementById('stepTxt');
  var noteEl=document.getElementById('stepNote');
  var noteH=(noteEl.style.display==='none')?0:(noteEl.offsetHeight+14);
  var maxH=container.clientHeight-80-noteH;
  var maxW=container.clientWidth-40;
  var size=40;
  el.style.fontSize=size+'px';
  while((el.scrollHeight>maxH||el.scrollWidth>maxW)&&size>13){
    size--;
    el.style.fontSize=size+'px';
  }
}

function renderPlayerStep(){
  var p=playerProtocol;
  var total=p.steps.length;
  var pct=Math.round((playerStep/total)*100);
  var sd=getStepData(p.steps[playerStep]);
  document.getElementById('stepLbl').textContent='STEP '+String(playerStep+1).padStart(2,'0');
  document.getElementById('stepTxt').textContent=sd.text;
  var noteEl=document.getElementById('stepNote');
  if(sd.note){noteEl.textContent=sd.note;noteEl.style.display='block';}
  else{noteEl.style.display='none';}
  document.getElementById('progCounter').textContent='STEP '+(playerStep+1)+' OF '+total;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  var isLast=playerStep===total-1;
  document.getElementById('nextBtn').style.display=isLast?'none':'block';
  document.getElementById('doneBtn').style.display=isLast?'block':'none';
  setTimeout(fitStepText,10);
}

function playerNext(){if(playerStep<playerProtocol.steps.length-1){playerStep++;renderPlayerStep();}}
function playerPrev(){
  if(playerStep>0){
    playerStep--;
    document.getElementById('nextBtn').style.display='block';
    document.getElementById('doneBtn').style.display='none';
    renderPlayerStep();
  }
}
function closePlayer(){document.getElementById('playerWrap').classList.remove('active');}

var weatherChart=null,currentTemp=31;

function fetchWeather(){
  var url='https://api.open-meteo.com/v1/forecast?latitude=23.8103&longitude=90.4125&hourly=temperature_2m,precipitation_probability&current_weather=true&timezone=Asia%2FDhaka&forecast_days=2';
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      var cw=data.current_weather;
      currentTemp=Math.round(cw.temperature);
      document.getElementById('tempDisplay').textContent=currentTemp;
      document.getElementById('condDisplay').textContent=getCondition(cw.weathercode);
      var hours=data.hourly.time,now=new Date(),temps=[],rains=[],labels=[];
      for(var i=0;i<hours.length&&labels.length<24;i++){
        var t=new Date(hours[i]);
        if(t>=now&&t.getMinutes()===0){
          temps.push(Math.round(data.hourly.temperature_2m[i]));
          rains.push(Math.round(data.hourly.precipitation_probability[i]));
          var h=t.getHours();
          labels.push(h===0?'12AM':h<12?h+'AM':h===12?'12PM':(h-12)+'PM');
        }
      }
      buildChart(temps,rains,labels,currentTemp);
    })
    .catch(function(){
      currentTemp=31;
      document.getElementById('tempDisplay').textContent='31';
      document.getElementById('condDisplay').textContent='PARTLY CLOUDY';
      var fT=[31,32,34,35,35,34,32,30,29,28,27,27,28,29,30,31,32,33,33,32,31,30,29,28];
      var fR=[10,15,20,35,40,35,25,15,10,5,5,5,10,20,30,35,30,25,20,15,10,10,5,5];
      var fL=[],now=new Date();
      for(var i=0;i<24;i++){var h=(now.getHours()+i)%24;fL.push(h===0?'12AM':h<12?h+'AM':h===12?'12PM':(h-12)+'PM');}
      buildChart(fT,fR,fL,currentTemp);
    });
}

function getCondition(code){
  if(code===0)return'CLEAR SKY';
  if(code<=3)return'PARTLY CLOUDY';
  if(code<=49)return'FOGGY';
  if(code<=69)return'DRIZZLE / RAIN';
  if(code<=79)return'SNOW';
  if(code<=99)return'THUNDERSTORM';
  return'CLOUDY';
}

function buildChart(temps,rains,labels,baseTemp){
  if(weatherChart){weatherChart.destroy();}
  var BAR_W=38,chartW=labels.length*BAR_W;
  document.getElementById('chartInner').style.width=chartW+'px';
  document.getElementById('chartInner').style.height='110px';
  var canvas=document.getElementById('wChart');
  canvas.style.width=chartW+'px';
  canvas.style.height='110px';
  var labelRow=document.getElementById('chartLabelRow');
  labelRow.innerHTML='';
  labels.forEach(function(l){
    var s=document.createElement('span');
    s.textContent=l;
    s.style.cssText='width:'+BAR_W+'px;display:inline-block;text-align:center;font-size:8px;color:var(--text-dim);font-family:\'Share Tech Mono\',monospace;';
    labelRow.appendChild(s);
  });
  labelRow.style.width=chartW+'px';
  var chartScroll=document.getElementById('chartScroll');
  var labelsScroll=document.getElementById('labelsScroll');
  chartScroll.addEventListener('scroll',function(){labelsScroll.scrollLeft=chartScroll.scrollLeft;},{passive:true});
  weatherChart=new Chart(canvas,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[
        {type:'line',label:'Temp °C',data:temps,borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,0.06)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#00d4ff',tension:0.4,yAxisID:'yTemp',order:1},
        {type:'bar',label:'Rain %',data:rains,backgroundColor:'rgba(0,130,255,0.25)',borderColor:'rgba(0,160,255,0.5)',borderWidth:1,borderRadius:2,yAxisID:'yRain',order:2}
      ]
    },
    options:{
      responsive:false,maintainAspectRatio:false,animation:{duration:400},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#0a1628',borderColor:'rgba(0,212,255,0.3)',borderWidth:1,titleColor:'#00d4ff',bodyColor:'#c8e8f5',titleFont:{family:'Share Tech Mono',size:9},bodyFont:{family:'Share Tech Mono',size:9}}},
      scales:{
        x:{ticks:{display:false},grid:{color:'rgba(0,212,255,0.04)'},border:{color:'rgba(0,212,255,0.08)'}},
        yTemp:{type:'linear',position:'left',min:baseTemp-10,max:baseTemp+10,ticks:{color:'#00d4ff',font:{size:8,family:'Share Tech Mono'},maxTicksLimit:4},grid:{color:'rgba(0,212,255,0.05)'},border:{color:'rgba(0,212,255,0.08)'}},
        yRain:{type:'linear',position:'right',min:0,max:100,ticks:{color:'rgba(0,140,255,0.7)',font:{size:8,family:'Share Tech Mono'},maxTicksLimit:4},grid:{drawOnChartArea:false},border:{color:'rgba(0,212,255,0.08)'}}
      }
    }
  });
}

function esc(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderHomeList();
fetchWeather();
window.addEventListener('resize',function(){if(playerProtocol)fitStepText();});
</script>
